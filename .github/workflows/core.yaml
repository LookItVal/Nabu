name: Build Nabu Core image and push to GitHub Container Registry

on:
  push:
    branches: [ "main" ]
    paths:
      - 'core/**' # Only run if files in the core folder change
      - '.github/workflows/core.yaml'
  workflow_dispatch: # Allows you to run this manually from the GitHub UI
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-core

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./core/go.mod
          cache-dependency-path: ./core/go.sum

      - name: Enforce 100% total test coverage
        working-directory: ./core
        run: |
          go test ./... -coverpkg=./... -coverprofile=coverage.out
          go tool cover -func=coverage.out | awk '/^total:/{gsub("%", "", $3); if ($3 + 0 < 100) {printf("total coverage %s%% is below 100%%\n", $3); exit 1}}'

      - name: Verify tests pass
        working-directory: ./core
        run: go test ./...

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./core
          file: ./core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
